# Historical tooling-only pyproject for the package subdirectory.
# Authoritative packaging metadata lives in ../pyproject.toml.

[tool.omnixan.packaging]
source_of_truth = "../pyproject.toml"
status = "historical-tooling-only"
legacy_files = ["setup.py", "requirements.txt", "pyproject.toml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"

[tool.black]
line-length = 100

[tool.isort]
profile = "black"
line_length = 100
