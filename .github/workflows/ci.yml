name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  baseline:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run baseline validation
        run: ./scripts/ci_local.sh baseline

  optional-smokes:
    runs-on: ubuntu-latest
    needs: baseline
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project with optional stacks
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev,distributed,quantum]'

      - name: Run optional smoke validation
        run: ./scripts/ci_local.sh optional-smokes
